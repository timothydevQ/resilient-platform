apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resilient-platform-ingress
  namespace: resilient-platform
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: api.resilient-platform.local
      http:
        paths:
          - path: /api/orders
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
