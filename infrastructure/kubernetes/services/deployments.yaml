# ── Namespace ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: resilient-platform
---
apiVersion: v1
kind: Namespace
metadata:
  name: resilient-platform-b
---
# ── ConfigMap ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: resilient-platform
data:
  REGION: "region-a"
  LOG_LEVEL: "info"
---
# ── API Gateway ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: resilient-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [api-gateway]
              topologyKey: kubernetes.io/hostname
      containers:
        - name: api-gateway
          image: ghcr.io/timothydevQ/resilient-platform/api-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: platform-config
          env:
            - name: HTTP_PORT
              value: "8000"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8080"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8082"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service:8081"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8083"
            - name: USER_SERVICE_URL
              value: "http://user-service:8084"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          terminationMessagePolicy: FallbackToLogsOnError
      terminationGracePeriodSeconds: 30
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: resilient-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: resilient-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# ── Order Service ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
